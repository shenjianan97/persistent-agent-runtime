spring:
  application:
    name: persistent-agent-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:55432}/${DB_NAME:persistent_agent_runtime}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  langfuse:
    enabled: ${LANGFUSE_ENABLED:true}
    host: ${LANGFUSE_HOST:http://127.0.0.1:3300}
    public-key: ${LANGFUSE_PUBLIC_KEY:pk-lf-local}
    secret-key: ${LANGFUSE_SECRET_KEY:sk-lf-local}
