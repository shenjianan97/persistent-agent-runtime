name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # ── Fast unit tests (no database) ─────────────────────────────────────────

  cdk-tests:
    name: CDK Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infrastructure/cdk/package-lock.json

      - name: Install CDK dependencies
        working-directory: infrastructure/cdk
        run: npm ci

      - name: Run CDK build
        working-directory: infrastructure/cdk
        run: npm run build

      - name: Run CDK tests
        working-directory: infrastructure/cdk
        run: npm test -- --runInBand

  console-tests:
    name: Console Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: services/console/package-lock.json

      - name: Install console dependencies
        working-directory: services/console
        run: npm ci

      - name: Run console tests
        working-directory: services/console
        run: npm test

  api-unit-tests:
    name: API Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Run API unit tests
        run: cd services/api-service && ./gradlew test

  python-unit-tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install worker dependencies
        run: pip install -e 'services/worker-service[dev]'

      - name: Run worker unit tests
        working-directory: services/worker-service
        run: |
          python -m pytest tests \
            --ignore=tests/test_checkpointer_integration.py \
            --ignore=tests/test_integration.py \
            -q

      - name: Run model-discovery unit tests
        run: python -m pytest tests/test_discover_models.py -q

  # ── Integration tests (require PostgreSQL) ────────────────────────────────

  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: persistent_agent_runtime
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Apply database migrations
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0001_phase1_durable_execution.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0002_worker_registry.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0003_dynamic_models.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0004_timeout_reference.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0005_agents_table.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0006_runtime_state_model.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0007_scheduler_and_budgets.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0008_tool_servers.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/test_seed.sql

      - name: Run API integration tests
        env:
          INTEGRATION_TESTS_ENABLED: "true"
        run: cd services/api-service && ./gradlew test

  worker-integration-tests:
    name: Worker Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: persistent_agent_runtime
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Install worker dependencies
        run: pip install -e 'services/worker-service[dev]'

      - name: Apply database migrations
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0001_phase1_durable_execution.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0002_worker_registry.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0003_dynamic_models.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0004_timeout_reference.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0005_agents_table.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0006_runtime_state_model.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0007_scheduler_and_budgets.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0008_tool_servers.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/test_seed.sql

      - name: Run worker integration tests
        working-directory: services/worker-service
        env:
          # test_checkpointer_integration.py reads this env var
          E2E_DB_DSN: postgresql://postgres:postgres@localhost:55432/persistent_agent_runtime
        run: |
          set -o pipefail
          python -m pytest tests/test_checkpointer_integration.py \
            tests/test_integration.py \
            -ra -q | tee /tmp/worker-integration.log
          ! grep -Eq '(^|[^0-9])[1-9][0-9]* skipped' /tmp/worker-integration.log

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: persistent_agent_runtime
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Install worker and E2E dependencies
        run: pip install -e 'services/worker-service[dev]'

      - name: Apply database migrations
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0001_phase1_durable_execution.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0002_worker_registry.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0003_dynamic_models.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0004_timeout_reference.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0005_agents_table.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0006_runtime_state_model.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0007_scheduler_and_budgets.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0008_tool_servers.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/test_seed.sql

      - name: Pre-build API service
        working-directory: services/api-service
        run: ./gradlew classes testClasses

      - name: Run E2E tests
        env:
          # Point conftest at the GH Actions PostgreSQL service (skips Docker management)
          E2E_DB_HOST: localhost
          E2E_DB_PORT: "55432"
          E2E_DB_NAME: persistent_agent_runtime
          E2E_DB_USER: postgres
          E2E_DB_PASSWORD: postgres
          APP_DEV_TASK_CONTROLS_ENABLED: "true"
          LANGFUSE_ENABLED: "false"
          # conftest will auto-start the API via ./gradlew bootRun
        run: |
          set -o pipefail
          python -u -m pytest tests/backend-integration \
            -ra -s -vv --tb=short 2>&1 | tee /tmp/e2e.log
          ! grep -Eq '(^|[^0-9])[1-9][0-9]* skipped' /tmp/e2e.log

      - name: Upload E2E log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-log
          path: /tmp/e2e.log
          if-no-files-found: ignore

  observability-smoke-tests:
    name: Observability Smoke Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: persistent_agent_runtime
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Install worker and E2E dependencies
        run: pip install -e 'services/worker-service[dev]'

      - name: Apply database migrations
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0001_phase1_durable_execution.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0002_worker_registry.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0003_dynamic_models.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0004_timeout_reference.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0005_agents_table.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0006_runtime_state_model.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0007_scheduler_and_budgets.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/0008_tool_servers.sql
          psql -h localhost -p 55432 -U postgres -d persistent_agent_runtime \
            -f infrastructure/database/migrations/test_seed.sql

      - name: Start Langfuse
        run: docker compose -p persistent-agent-runtime-langfuse -f tests/fixtures/langfuse/docker-compose.yml up -d

      - name: Wait for Langfuse
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3300 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Langfuse did not become ready in time" >&2
          exit 1

      - name: Run Langfuse E2E tests
        env:
          E2E_DB_HOST: localhost
          E2E_DB_PORT: "55432"
          E2E_DB_NAME: persistent_agent_runtime
          E2E_DB_USER: postgres
          E2E_DB_PASSWORD: postgres
          APP_DEV_TASK_CONTROLS_ENABLED: "true"
          LANGFUSE_HOST: http://127.0.0.1:3300
          LANGFUSE_PUBLIC_KEY: pk-lf-local
          LANGFUSE_SECRET_KEY: sk-lf-local
        run: |
          set -o pipefail
          python -m pytest tests/e2e-langfuse -ra -q | tee /tmp/observability-smoke.log
          ! grep -Eq '(^|[^0-9])[1-9][0-9]* skipped' /tmp/observability-smoke.log

      - name: Stop Langfuse
        if: always()
        run: docker compose -p persistent-agent-runtime-langfuse -f tests/fixtures/langfuse/docker-compose.yml down -v
